<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☀ Weather Finder</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="container" id="container">
      <div class="card">
        <div class="front">
          <h1>Weather Finder</h1>
          <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name" />
            <button id="search-btn" >Search</button>
          </div>
        </div>
        <div class="back">
          <div>
            <img
              src="./assist/image.png"
              alt="Weather Icon"
              id="weather-icon"
            />
          </div>
          <div class="temp" id="temp"><h3>30°C</h3></div>
          <div class="city" id="city-name"><h3>Karachi</h3></div>
          <div class="condition" id="condition"><h3>Sunny</h3></div>
          <div class="detail">
            <div class="humidity" >
              <h3 id="humidity">71%</h3>
              <p>Humidity</p>
            </div>
            <div class="windSpeed" >
              <h3 id="wind-speed">10 km/h</h3>
              <p>Wind Speed</p>
            </div>
            <button id="back-btn">Back</button>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
